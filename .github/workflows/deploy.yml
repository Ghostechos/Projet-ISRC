name: Deploy ISRC LOGISTIA

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Terraform
    runs-on: self-hosted
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4.2.2

      - name: Lint Terraform
        working-directory: terraform
        run: |
          terraform init
          terraform fmt -check -recursive

  security-scan:
    name: Scan sécurité
    runs-on: self-hosted
    needs: lint
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4.2.2

      - name: Installer tfsec
        run: |
          curl -L https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-linux-amd64 -o /usr/local/bin/tfsec && chmod +x /usr/local/bin/tfsec || true

      - name: Lancer tfsec
        working-directory: terraform
        run: tfsec . --no-color || true

  terraform-plan:
    name: Terraform Plan
    runs-on: self-hosted
    needs: security-scan
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4.2.2

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Générer VMID variables
        working-directory: terraform
        run: |
          cat > terraform.auto.tfvars << EOFVARS
          vmid_wazuh   = 110
          vmid_graylog = 111
          vmid_ia      = 112
          EOFVARS

      - name: Terraform Plan
        working-directory: terraform
        env:
          TF_VAR_proxmox_token_secret: ${{ secrets.PROXMOX_TOKEN_SECRET }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: terraform plan

  terraform-apply:
    name: Terraform Apply
    runs-on: self-hosted
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4.2.2

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Générer VMID variables
        working-directory: terraform
        run: |
          cat > terraform.auto.tfvars << EOFVARS
          vmid_wazuh   = 110
          vmid_graylog = 111
          vmid_ia      = 112
          EOFVARS

      - name: Terraform Apply
        working-directory: terraform
        env:
          TF_VAR_proxmox_token_secret: ${{ secrets.PROXMOX_TOKEN_SECRET }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: terraform apply -auto-approve -parallelism=1

  ansible-deploy:
    name: Ansible Deploy
    runs-on: self-hosted
    needs: terraform-apply
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4.2.2

      - name: Attendre que les VMs soient prêtes
        run: sleep 90

      - name: Lancer le playbook Ansible
        working-directory: ansible
        run: |
          ansible-playbook \
            -i inventory.ini \
            playbook.yml \
            --private-key /home/runner/.ssh/id_ed25519_isrc \
            -v
